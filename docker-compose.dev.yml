version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: staybnb-mongodb-dev
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: staybnb
    volumes:
      - mongodb_dev_data:/data/db
    networks:
      - staybnb-dev-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: staybnb-redis-dev
    ports:
      - "6379:6379"
    networks:
      - staybnb-dev-network

  # Backend API Server (Development)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: development
    container_name: staybnb-server-dev
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/staybnb?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-jwt-refresh-secret-change-in-production
      JWT_EXPIRE: 15m
      JWT_REFRESH_EXPIRE: 7d
      COOKIE_SECRET: dev-cookie-secret
      CLIENT_URL: http://localhost:3000
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - mongodb
      - redis
    networks:
      - staybnb-dev-network

  # Frontend Client (Development)
  client:
    image: node:20-alpine
    container_name: staybnb-client-dev
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5000/api/v1
    volumes:
      - ./client:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - server
    networks:
      - staybnb-dev-network

networks:
  staybnb-dev-network:
    driver: bridge

volumes:
  mongodb_dev_data:
    driver: local
